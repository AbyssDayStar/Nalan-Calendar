name: Send Matrix Notification

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  send_message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt   # ← 安装你的项目依赖
          pip install matrix-commander

      - name: Run Python script
        env:
          MATRIX_HOMESERVER: ${{ secrets.MATRIX_HOMESERVER }}
          MATRIX_USERNAME: ${{ secrets.MATRIX_USERNAME }}   # ← 与 secret 名一致
          MATRIX_PASSWORD: ${{ secrets.MATRIX_PASSWORD }}
          MATRIX_ROOM_ID: ${{ secrets.MATRIX_ROOM_ID }}     # ← 可选，也可硬编码
        run: python main.py