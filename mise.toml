min_version = "2024.9.5"

[tools]
python = "3.11"

[env]
_.python.venv = { path = ".venv", create = true }
PIP_INDEX_URL = "https://mirrors.aliyun.com/pypi/simple/"

[tasks.install]
description = "安装项目依赖"
run = "pip install -r requirements.txt"

[tasks.run]
description = "运行 Matrix 机器人：Nalan日历"
run = "python main.py"

[settings]
github_attestations = false 
